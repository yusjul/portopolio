<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#131313"/>
  <!-- Border accent -->
  <rect width="32" height="32" rx="4" fill="none" stroke="#00dbe7" stroke-width="1" opacity="0.4"/>
  <!-- Y letter -->
  <text x="4" y="23" font-family="monospace" font-size="17" font-weight="900" fill="#00dbe7" filter="url(#glow)" letter-spacing="-1">YJ</text>
  <!-- Bottom line accent -->
  <line x1="4" y1="27" x2="28" y2="27" stroke="#00dbe7" stroke-width="1" opacity="0.5"/>
</svg>
